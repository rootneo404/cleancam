<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CleanCam</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
    font-family: 'SF Pro Display', -apple-system, sans-serif;
    touch-action: none;
    user-select: none;
  }

  #video {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
  }

  #canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #bubble-layer {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #ui {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    pointer-events: none;
    z-index: 10;
  }

  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 56px 20px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    pointer-events: all;
  }

  #logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #logo-icon {
    width: 32px;
    height: 32px;
    background: #00E87A;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  #logo-text {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }

  #logo-text span {
    color: #00E87A;
  }

  #stats-bar {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .stat-pill {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .stat-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #00E87A;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  #progress-bar-container {
    margin: 0 16px;
    margin-top: auto;
    padding-bottom: 24px;
    pointer-events: none;
  }

  #progress-track {
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 12px 16px;
  }

  #progress-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  #progress-label span:first-child {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  #pct-text {
    font-size: 18px;
    font-weight: 700;
    color: #00E87A;
  }

  #progress-fill-track {
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    overflow: hidden;
  }

  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00c96a, #00E87A, #7dffb3);
    border-radius: 10px;
    width: 0%;
    transition: width 0.5s ease;
  }

  #start-screen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 40px;
  }

  #start-screen h1 {
    font-size: 48px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -2px;
    margin-bottom: 4px;
  }

  #start-screen h1 span { color: #00E87A; }

  #start-screen p {
    font-size: 16px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
    margin-bottom: 48px;
  }

  #start-btn {
    background: #00E87A;
    color: #000;
    font-size: 18px;
    font-weight: 700;
    border: none;
    border-radius: 18px;
    padding: 18px 48px;
    cursor: pointer;
    letter-spacing: -0.3px;
    transition: transform 0.1s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #start-btn:active { transform: scale(0.96); background: #00cf6c; }

  #reset-btn {
    position: fixed;
    bottom: 100px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    z-index: 20;
    color: white;
    pointer-events: all;
    -webkit-tap-highlight-color: transparent;
  }

  #sensitivity-btn {
    position: fixed;
    bottom: 160px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    cursor: pointer;
    z-index: 20;
    color: white;
    pointer-events: all;
    -webkit-tap-highlight-color: transparent;
  }

  .bubble {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    will-change: transform, opacity;
    transform-origin: center;
  }

  .bubble.active {
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-6px) scale(1.03); }
  }

  .bubble.popping {
    animation: pop 0.35s ease-out forwards;
  }

  @keyframes pop {
    0% { transform: scale(1); opacity: 1; }
    40% { transform: scale(1.5); opacity: 0.7; }
    100% { transform: scale(0); opacity: 0; }
  }

  #done-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 2px solid #00E87A;
    border-radius: 28px;
    padding: 32px 40px;
    text-align: center;
    z-index: 200;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  #done-banner.show {
    transform: translate(-50%, -50%) scale(1);
  }

  #done-banner h2 {
    font-size: 32px;
    font-weight: 800;
    color: #00E87A;
    margin-bottom: 8px;
  }

  #done-banner p {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
  }

  #sensitivity-popup {
    position: fixed;
    bottom: 220px;
    right: 16px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 16px;
    z-index: 50;
    display: none;
    min-width: 180px;
  }

  #sensitivity-popup.visible { display: block; }

  #sensitivity-popup label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    display: block;
    margin-bottom: 10px;
  }

  #sensitivity-popup input[type=range] {
    width: 100%;
    accent-color: #00E87A;
  }

  #sensitivity-popup .val {
    font-size: 13px;
    color: #00E87A;
    font-weight: 700;
    text-align: right;
    margin-top: 4px;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>
<div id="bubble-layer"></div>

<div id="ui">
  <div id="header">
    <div id="logo">
      <div id="logo-icon">🫧</div>
      <div id="logo-text">Clean<span>Cam</span></div>
    </div>
    <div id="stats-bar">
      <div class="stat-pill"><div class="stat-dot"></div><span id="bubble-count">0</span> left</div>
    </div>
  </div>

  <div id="progress-bar-container">
    <div id="progress-track">
      <div id="progress-label">
        <span>Floor cleaned</span>
        <span id="pct-text">0%</span>
      </div>
      <div id="progress-fill-track">
        <div id="progress-fill"></div>
      </div>
    </div>
  </div>
</div>

<button id="sensitivity-btn" title="Sensitivity">⚙️</button>
<button id="reset-btn" title="Reset">🔄</button>

<div id="sensitivity-popup">
  <label>Motion sensitivity</label>
  <input type="range" id="sens-slider" min="10" max="80" value="35">
  <div class="val" id="sens-val">Medium</div>
</div>

<div id="done-banner">
  <h2>✅ All Clean!</h2>
  <p>Great job! Floor is spotless.</p>
</div>

<div id="start-screen">
  <h1>Clean<span>Cam</span></h1>
  <p>Mount your phone to your vacuum. Green bubbles will appear — vacuum them up to clean your floor!</p>
  <button id="start-btn">Start Cleaning</button>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const bubbleLayer = document.getElementById('bubble-layer');
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('start-btn');
const resetBtn = document.getElementById('reset-btn');
const progressFill = document.getElementById('progress-fill');
const pctText = document.getElementById('pct-text');
const bubbleCount = document.getElementById('bubble-count');
const doneBanner = document.getElementById('done-banner');
const sensBtn = document.getElementById('sensitivity-btn');
const sensPopup = document.getElementById('sensitivity-popup');
const sensSlider = document.getElementById('sens-slider');
const sensVal = document.getElementById('sens-val');

let bubbles = [];
let prevFrame = null;
let animFrame;
let totalBubbles = 0;
let poppedBubbles = 0;
let sensitivity = 35;
let running = false;
let donShown = false;

const GRID_COLS = 6;
const GRID_ROWS = 10;
let CELL_W, CELL_H;

function sensLabel(v) {
  if (v < 25) return 'Low';
  if (v < 50) return 'Medium';
  return 'High';
}

sensSlider.addEventListener('input', () => {
  sensitivity = parseInt(sensSlider.value);
  sensVal.textContent = sensLabel(sensitivity);
});

sensBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  sensPopup.classList.toggle('visible');
});

document.addEventListener('click', () => sensPopup.classList.remove('visible'));

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  CELL_W = window.innerWidth / GRID_COLS;
  CELL_H = window.innerHeight / GRID_ROWS;
}

window.addEventListener('resize', resize);
resize();

function createBubble(col, row) {
  const margin = 12;
  const x = col * CELL_W + margin + Math.random() * (CELL_W - margin * 2);
  const y = row * CELL_H + margin + Math.random() * (CELL_H - margin * 2);
  const size = 22 + Math.random() * 20;
  const hue = 140 + Math.random() * 30;
  const alpha = 0.55 + Math.random() * 0.3;
  const delay = Math.random() * 2;

  const el = document.createElement('div');
  el.className = 'bubble active';
  el.style.cssText = `
    width: ${size}px;
    height: ${size}px;
    left: ${x - size/2}px;
    top: ${y - size/2}px;
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.6), hsla(${hue},100%,60%,${alpha}));
    box-shadow: inset -3px -3px 8px rgba(0,180,80,0.3), 0 0 ${size*0.4}px hsla(${hue},100%,70%,0.4);
    border: 1.5px solid rgba(255,255,255,0.5);
    animation-delay: -${delay}s;
  `;

  bubbleLayer.appendChild(el);
  return {
    el, x, y, size, col, row,
    alive: true, popping: false
  };
}

function spawnBubbles() {
  bubbles = [];
  bubbleLayer.innerHTML = '';
  poppedBubbles = 0;
  donShown = false;
  doneBanner.classList.remove('show');

  for (let row = 0; row < GRID_ROWS; row++) {
    for (let col = 0; col < GRID_COLS; col++) {
      if (Math.random() > 0.12) {
        bubbles.push(createBubble(col, row));
      }
    }
  }

  totalBubbles = bubbles.length;
  updateUI();
}

function updateUI() {
  const alive = bubbles.filter(b => b.alive).length;
  bubbleCount.textContent = alive;
  const pct = totalBubbles > 0 ? Math.round((poppedBubbles / totalBubbles) * 100) : 0;
  progressFill.style.width = pct + '%';
  pctText.textContent = pct + '%';

  if (pct === 100 && !donShown) {
    donShown = true;
    setTimeout(() => doneBanner.classList.add('show'), 300);
  }
}

function popBubble(b) {
  if (!b.alive || b.popping) return;
  b.alive = false;
  b.popping = true;
  poppedBubbles++;
  b.el.classList.remove('active');
  b.el.classList.add('popping');

  b.el.addEventListener('animationend', () => {
    b.el.remove();
  }, { once: true });

  updateUI();
}

function processMotion() {
  if (!running) return;

  canvas.width = video.videoWidth || window.innerWidth;
  canvas.height = video.videoHeight || window.innerHeight;

  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = frame.data;

  if (prevFrame) {
    const prev = prevFrame.data;
    const motionMap = new Float32Array(GRID_COLS * GRID_ROWS);

    const pw = canvas.width / GRID_COLS;
    const ph = canvas.height / GRID_ROWS;
    const step = 6;

    for (let py = 0; py < canvas.height; py += step) {
      for (let px = 0; px < canvas.width; px += step) {
        const idx = (py * canvas.width + px) * 4;
        const dr = data[idx] - prev[idx];
        const dg = data[idx+1] - prev[idx+1];
        const db = data[idx+2] - prev[idx+2];
        const diff = Math.abs(dr) + Math.abs(dg) + Math.abs(db);

        const col = Math.floor(px / pw);
        const row = Math.floor(py / ph);
        const cell = row * GRID_COLS + col;
        if (cell >= 0 && cell < motionMap.length) {
          motionMap[cell] += diff;
        }
      }
    }

    const threshold = sensitivity * 2000;

    bubbles.forEach(b => {
      if (!b.alive) return;
      const cell = b.row * GRID_COLS + b.col;
      if (motionMap[cell] > threshold) {
        popBubble(b);
      }
    });
  }

  prevFrame = frame;
}

let lastMotion = 0;
function loop(ts) {
  if (ts - lastMotion > 100) {
    processMotion();
    lastMotion = ts;
  }
  animFrame = requestAnimationFrame(loop);
}

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    running = true;
    spawnBubbles();
    requestAnimationFrame(loop);
    startScreen.style.display = 'none';
  } catch (err) {
    alert('Camera access is needed. Please allow camera permission and try again.\n\n' + err.message);
  }
}

startBtn.addEventListener('click', startCamera);

resetBtn.addEventListener('click', () => {
  prevFrame = null;
  spawnBubbles();
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    running = false;
    cancelAnimationFrame(animFrame);
  } else if (video.srcObject) {
    running = true;
    requestAnimationFrame(loop);
  }
});
</script>
</body>
</html>
